version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mission-control-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: missioncontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      DATABASE_URL: postgresql://postgres:***@postgres:5432/missioncontrol
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  hermes-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control-hermes-bridge
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/missioncontrol
      HERMES_BRIDGE_URL: ${HERMES_BRIDGE_URL}
      HERMES_BRIDGE_TOKEN: ${HERMES_BRIDGE_TOKEN}
      HERMES_BRIDGE_INTERVAL_SECONDS: ${HERMES_BRIDGE_INTERVAL_SECONDS:-10}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    command: ["sh", "-c", "pnpm install && sh apps/api/src/cli/hermes-bridge-loop.sh"]

volumes:
  pgdata:
