version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mission-control-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: missioncontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mission-control-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/missioncontrol
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm -C apps/api exec tsx src/db/migrate.ts && pnpm -C apps/api exec tsx src/server.ts"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: mission-control-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - api
    command: sh -c "cd apps/web && pnpm dev --host 0.0.0.0 --port 5173"

  hermes-bridge:
    build:
      context: .
      dockerfile: Dockerfile.hermes-bridge
    container_name: mission-control-hermes-bridge
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/missioncontrol
      HERMES_INGEST_TOKEN: ${HERMES_INGEST_TOKEN:-test-token}
      AGENTIQ_API_URL: http://api:3000
      HERMES_BRIDGE_INTERVAL_SECONDS: ${HERMES_BRIDGE_INTERVAL_SECONDS:-10}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata: